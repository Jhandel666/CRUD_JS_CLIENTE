<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Clientes - Node.js</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0ecff, #f7faff);
      color: #1f2937;
    }

    .contenedor {
      max-width: 1150px;
      margin: 35px auto;
      padding: 20px;
    }

    .cabecera {
      text-align: center;
      margin-bottom: 24px;
    }

    .cabecera h1 {
      margin: 0;
      font-size: 32px;
      color: #0f172a;
    }

    .cabecera p {
      margin-top: 8px;
      color: #475569;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
      padding: 22px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
      color: #111827;
    }

    .campo {
      margin-bottom: 14px;
    }

    .campo label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #334155;
    }

    .campo input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    .campo input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .botones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-guardar { background: #2563eb; color: white; }
    .btn-nuevo { background: #64748b; color: white; }
    .btn-editar { background: #f59e0b; color: white; }
    .btn-eliminar { background: #dc2626; color: white; }
    .btn-actualizar { background: #059669; color: white; }

    .mensaje {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .mensaje.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .mensaje.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .tabla-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #0f172a;
      color: white;
    }

    th, td {
      padding: 13px 10px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .acciones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .estado {
      margin-top: 10px;
      font-size: 14px;
      color: #64748b;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <h1>CRUD de Clientes</h1>
      <p>Formulario conectado con Node.js, Express y Supabase PostgreSQL</p>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="layout">
      <div class="card">
        <h2>Formulario</h2>
        <form id="formCliente">
          <input type="hidden" id="id_cliente">

          <div class="campo">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" placeholder="Ingrese los nombres" required>
          </div>

          <div class="campo">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" placeholder="Ingrese los apellidos" required>
          </div>

          <div class="campo">
            <label for="direccion">Dirección</label>
            <input type="text" id="direccion" placeholder="Ingrese la dirección" required>
          </div>

          <div class="campo">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="Ingrese el teléfono" required>
          </div>

          <div class="botones">
            <button type="submit" id="btnSubmit" class="btn-guardar">Guardar cliente</button>
            <button type="button" class="btn-nuevo" onclick="limpiarFormulario()">Nuevo</button>
          </div>
        </form>

        <div class="estado">Usa GET, POST, PUT y DELETE desde el mismo formulario.</div>
      </div>

      <div class="card">
        <h2>Lista de clientes</h2>
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaClientes"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const formCliente = document.getElementById('formCliente');
    const tablaClientes = document.getElementById('tablaClientes');
    const mensaje = document.getElementById('mensaje');
    const btnSubmit = document.getElementById('btnSubmit');

    function mostrarMensaje(texto, tipo) {
      mensaje.className = 'mensaje ' + tipo;
      mensaje.textContent = texto;

      setTimeout(() => {
        mensaje.className = 'mensaje';
        mensaje.textContent = '';
      }, 3000);
    }

    function limpiarFormulario() {
      document.getElementById('id_cliente').value = '';
      document.getElementById('nombres').value = '';
      document.getElementById('apellidos').value = '';
      document.getElementById('direccion').value = '';
      document.getElementById('telefono').value = '';
      btnSubmit.textContent = 'Guardar cliente';
      btnSubmit.className = 'btn-guardar';
    }

    function cargarFormulario(cliente) {
      document.getElementById('id_cliente').value = cliente.id_cliente;
      document.getElementById('nombres').value = cliente.nombres;
      document.getElementById('apellidos').value = cliente.apellidos;
      document.getElementById('direccion').value = cliente.direccion;
      document.getElementById('telefono').value = cliente.telefono;
      btnSubmit.textContent = 'Actualizar cliente';
      btnSubmit.className = 'btn-actualizar';
    }

    async function listarClientes() {
      try {
        const respuesta = await fetch('/clientes');
        const clientes = await respuesta.json();

        if (!respuesta.ok) {
          throw new Error(clientes.mensaje || 'No se pudieron cargar los clientes');
        }

        tablaClientes.innerHTML = '';

        clientes.forEach((cliente) => {
          const fila = document.createElement('tr');
          fila.innerHTML = `
            <td>${cliente.id_cliente}</td>
            <td>${cliente.nombres}</td>
            <td>${cliente.apellidos}</td>
            <td>${cliente.direccion}</td>
            <td>${cliente.telefono}</td>
            <td>
              <div class="acciones">
                <button class="btn-editar" onclick="editarCliente(${cliente.id_cliente})">Editar</button>
                <button class="btn-eliminar" onclick="eliminarCliente(${cliente.id_cliente})">Eliminar</button>
              </div>
            </td>
          `;
          tablaClientes.appendChild(fila);
        });
      } catch (error) {
        mostrarMensaje(error.message, 'error');
      }
    }

    async function editarCliente(id) {
      try {
        const respuesta = await fetch('/clientes/' + id);
        const cliente = await respuesta.json();

        if (!respuesta.ok) {
          throw new Error(cliente.mensaje || 'No se pudo obtener el cliente');
        }

        cargarFormulario(cliente);
      } catch (error) {
        mostrarMensaje(error.message, 'error');
      }
    }

    async function eliminarCliente(id) {
      const confirmar = confirm('¿Deseas eliminar este cliente?');
      if (!confirmar) return;

      try {
        const respuesta = await fetch('/eliminar-cliente/' + id, {
          method: 'DELETE'
        });

        const data = await respuesta.json();

        if (!respuesta.ok) {
          throw new Error(data.mensaje || 'No se pudo eliminar');
        }

        mostrarMensaje(data.mensaje, 'ok');
        limpiarFormulario();
        listarClientes();
      } catch (error) {
        mostrarMensaje(error.message, 'error');
      }
    }

    formCliente.addEventListener('submit', async function(e) {
      e.preventDefault();

      const id = document.getElementById('id_cliente').value;

      const cliente = {
        nombres: document.getElementById('nombres').value.trim(),
        apellidos: document.getElementById('apellidos').value.trim(),
        direccion: document.getElementById('direccion').value.trim(),
        telefono: document.getElementById('telefono').value.trim()
      };

      try {
        let respuesta;
        let data;

        if (id) {
          respuesta = await fetch('/actualizar-cliente/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cliente)
          });
        } else {
          respuesta = await fetch('/guardar-cliente', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cliente)
          });
        }

        data = await respuesta.json();

        if (!respuesta.ok) {
          throw new Error(data.mensaje || 'Ocurrió un error');
        }

        mostrarMensaje(data.mensaje, 'ok');
        limpiarFormulario();
        listarClientes();
      } catch (error) {
        mostrarMensaje(error.message, 'error');
      }
    });

    listarClientes();
  </script>
</body>
</html>
